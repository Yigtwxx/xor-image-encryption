name: Bug report
description: Report a reproducible bug in encryption/decryption behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run command ...
        2. Use seed(s) ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command used
      placeholder: python xor_single.py --input ... --seed ... --outdir ...
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, dependency versions
