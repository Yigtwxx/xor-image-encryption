name: Feature request
description: Suggest an improvement for CLI, docs, or workflow
title: "[Feature]: "
labels: [enhancement]
body:
  - type: input
    id: problem
    attributes:
      label: Problem
      placeholder: What pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe your ideal solution.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Optional
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Multi-seed behavior
        - Documentation
        - Tests/CI
        - Performance
        - Other
